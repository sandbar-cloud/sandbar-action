name: "Deploy to Sandbar"
description: "Deploy static sites to Sandbar"
branding:
  icon: "upload-cloud"
  color: "orange"

inputs:
  version:
    description: "Sandbar CLI version (default: latest)"
    required: false
    default: "latest"
  dir:
    description: "Build output directory"
    required: false
  message:
    description: "Deploy message"
    required: false
  working-directory:
    description: "Working directory (where .sandbar/config.toml lives)"
    required: false
    default: "."

outputs:
  url:
    description: "Deployed site URL"
    value: ${{ steps.deploy.outputs.url }}
  deploy-id:
    description: "Deploy ID"
    value: ${{ steps.deploy.outputs.deploy_id }}

runs:
  using: "composite"
  steps:
    - name: Install Sandbar CLI
      shell: bash
      env:
        VERSION_INPUT: ${{ inputs.version }}
      run: |
        set -euo pipefail

        # Resolve the release tag. "latest" follows the GitHub
        # releases/latest redirect; explicit input is normalised to vX.Y.Z.
        if [ "$VERSION_INPUT" = "latest" ]; then
          TAG=$(curl -fsSL -o /dev/null -w '%{url_effective}' \
            https://github.com/sandbar-cloud/sandbar-cli/releases/latest \
            | sed 's|.*/||')
        else
          TAG="v${VERSION_INPUT#v}"
        fi
        VERSION="${TAG#v}"

        # Map runner OS/arch to goreleaser's archive naming.
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
          *) echo "Unsupported architecture: $ARCH" >&2; exit 1 ;;
        esac

        URL="https://github.com/sandbar-cloud/sandbar-cli/releases/download/${TAG}/sandbar_${VERSION}_${OS}_${ARCH}.tar.gz"
        TMPDIR=$(mktemp -d)
        echo "Installing sandbar $TAG ($OS/$ARCH) from $URL"
        curl -fsSL "$URL" | tar xz -C "$TMPDIR"

        # Stage under $HOME/.local/bin so we don't need sudo, then
        # prepend to GITHUB_PATH so later steps find the binary.
        mkdir -p "$HOME/.local/bin"
        mv "$TMPDIR/sandbar" "$HOME/.local/bin/sandbar"
        chmod +x "$HOME/.local/bin/sandbar"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        rm -rf "$TMPDIR"

        "$HOME/.local/bin/sandbar" version

    - name: Deploy
      id: deploy
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        sandbar login

        ARGS=""
        if [ -n "${{ inputs.dir }}" ]; then
          ARGS="$ARGS --dir ${{ inputs.dir }}"
        fi
        if [ -n "${{ inputs.message }}" ]; then
          ARGS="$ARGS --message \"${{ inputs.message }}\""
        fi

        OUTPUT=$(eval sandbar deploy $ARGS 2>&1)
        echo "$OUTPUT"

        URL=$(echo "$OUTPUT" | grep -E '^\s*(URL|Preview):' | awk '{print $2}')
        DEPLOY_ID=$(echo "$OUTPUT" | grep -E '^\s*Deploy:' | awk '{print $2}')

        echo "url=$URL" >> "$GITHUB_OUTPUT"
        echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
